{% extends 'parse/base.html' %}

{% block content %}
    <h2>{{ header }}</h2>

    {% if site.status == 'processing' or site.status == 'new' %}
        <meta http-equiv="refresh" content="5">
    {% endif %}

    {% if site.status == 'done' %}
        <script>
            window.location.href = "{% url 'parsed_data_detail' site.parsed_data.id %}"
        </script>
    {% endif %}
{% endblock %}
