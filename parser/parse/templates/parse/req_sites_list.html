{% extends 'parse/base.html' %}

{% block content %}
<div class="container">
    <h1>{{ header }}</h1>
    <ol>
        {% for site in sites %}
            {% if site.parsed_data %}
                <li>{{ site }} <a href="{% url 'parsed_data_detail' site.parsed_data.id %}">Check result</a></li> 
            {% else %}
                <li>{{ site }} | No results</li>
            {% endif %}
            {% empty %}
                <p>{{ empty_message }}</p>
            {% endfor %}
        </ol>
</div>
{% endblock %}
