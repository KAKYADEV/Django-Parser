{% extends 'parse/base.html' %}

{% block content %}
    <h1>{{ header }}</h1>
    <p>Site name: {{ site.name }}</p>
    <p>URL: {{ site.url }}</p>
    <form method="post" action="{% url 'start_parse' site.id %}">
        {% csrf_token %}
        <button type="submit">Start parsing</button>
    </form>
    <a href="{% url 'req_site_list' %}">Request list</a>
{% endblock %}
