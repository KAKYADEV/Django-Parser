{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>{{ title }}</title>
        <link type="text/css" href="{% static 'parse/css/stile1.css' %}" rel="stylesheet" />
    </head>
    <body>
        <header>
            <h1>YouParse</h1>
            <nav>
                <a class="navigation" href="{% url 'index' %}">Home</a>
                <a class="navigation" href="{% url 'about' %}">About</a>
                <div class="login-section">
                    {% if user.is_authenticated %}
                        <a href="{% url 'req_site_list' %}">{{ user.username }}</a>| <a href="{% url 'logout' %}">Log out</a>
                    {% else %}
                        <a href="{% url 'register' %}">Register</a> | <a href="{% url 'login' %}">Log in</a>
                    {% endif %}
                </div>
                
            </nav>
        </header>
        {% block content %} 
        {% endblock %}
    </body>
</html>
